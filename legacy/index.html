<!DOCTYPE html>
<html lang="es-AR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0d2137" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="manifest" href="public/manifest.json" />
  <title>Río Paranacito · Info</title>

  <!-- Google Fonts: Atkinson Hyperlegible (especialmente diseñada para accesibilidad) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --azul-noche: #0d2137;
      --azul-rio: #1a4a7a;
      --azul-claro: #2e78c7;
      --verde-agua: #00c9a7;
      --amarillo: #ffd166;
      --rojo-alerta: #ef233c;
      --blanco: #f0f4ff;
      --gris-suave: #a8b8cc;
      --sombra: rgba(0,0,0,0.5);
      --radio: 24px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html { font-size: 22px; }

    body {
      font-family: 'Atkinson Hyperlegible', Georgia, serif;
      background: var(--azul-noche);
      color: var(--blanco);
      min-height: 100vh;
      padding: 0;
      overflow-x: hidden;
    }

    /* ─── FONDO ANIMADO ─── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 120% 60% at 50% 100%, rgba(26,74,122,0.6) 0%, transparent 70%),
        radial-gradient(ellipse 80% 40% at 20% 20%, rgba(46,120,199,0.15) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* Olas animadas en el fondo */
    .olas-bg {
      position: fixed;
      bottom: 0;
      left: -10%;
      width: 120%;
      height: 180px;
      opacity: 0.08;
      pointer-events: none;
      z-index: 0;
    }
    .ola { animation: ola-mov 8s ease-in-out infinite; transform-origin: center; }
    .ola:nth-child(2) { animation-delay: -3s; animation-duration: 11s; opacity: 0.6; }
    .ola:nth-child(3) { animation-delay: -6s; animation-duration: 14s; opacity: 0.4; }
    @keyframes ola-mov {
      0%, 100% { transform: translateX(0) scaleY(1); }
      50% { transform: translateX(-3%) scaleY(1.05); }
    }

    /* ─── LAYOUT PRINCIPAL ─── */
    #app {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 20px 16px 120px;
    }

    /* ─── HEADER ─── */
    header {
      text-align: center;
      padding: 28px 20px 20px;
      margin-bottom: 24px;
    }
    header .titulo {
      font-size: 2rem;
      font-weight: 700;
      color: var(--blanco);
      letter-spacing: -0.02em;
      line-height: 1.1;
    }
    header .subtitulo {
      font-size: 1rem;
      color: var(--gris-suave);
      margin-top: 6px;
    }
    .logo-ola { font-size: 2.5rem; display: block; margin-bottom: 8px; }

    /* ─── ÚLTIMA ACTUALIZACIÓN ─── */
    .ultima-act {
      text-align: center;
      font-size: 0.78rem;
      color: var(--gris-suave);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .dot-live {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--verde-agua);
      animation: pulso 2s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes pulso {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    /* ─── GRID DE TARJETAS ─── */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      margin-bottom: 20px;
    }
    @media (max-width: 600px) {
      .grid { grid-template-columns: 1fr; }
    }

    /* ─── TARJETA ─── */
    .tarjeta {
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: var(--radio);
      padding: 28px 24px;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
      min-height: 200px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      position: relative;
      overflow: hidden;
    }
    .tarjeta::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 60%);
      pointer-events: none;
    }
    .tarjeta:active { transform: scale(0.97); background: rgba(255,255,255,0.1); }
    .tarjeta.alerta-precaucion { border-color: rgba(255,209,102,0.5); background: rgba(255,209,102,0.07); }
    .tarjeta.alerta-peligro { border-color: rgba(239,35,60,0.5); background: rgba(239,35,60,0.07); }

    .tarjeta-icono {
      font-size: 2.8rem;
      line-height: 1;
    }
    .tarjeta-titulo {
      font-size: 0.85rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--gris-suave);
    }
    .tarjeta-valor {
      font-size: 2.4rem;
      font-weight: 700;
      color: var(--blanco);
      line-height: 1;
    }
    .tarjeta-valor span { font-size: 1.1rem; font-weight: 400; color: var(--gris-suave); }
    .tarjeta-sub {
      font-size: 0.95rem;
      color: var(--gris-suave);
      line-height: 1.4;
    }

    /* ─── INDICADOR TENDENCIA ─── */
    .tendencia {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 99px;
      font-size: 0.85rem;
      font-weight: 700;
      margin-top: 4px;
      width: fit-content;
    }
    .tendencia.sube { background: rgba(239,35,60,0.2); color: #ff6b6b; }
    .tendencia.baja { background: rgba(0,201,167,0.2); color: var(--verde-agua); }
    .tendencia.estable { background: rgba(168,184,204,0.2); color: var(--gris-suave); }

    /* ─── TARJETA CLIMA (ancho completo) ─── */
    .tarjeta-clima {
      grid-column: 1 / -1;
    }
    .clima-hoy {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .clima-hoy-temp {
      font-size: 3rem;
      font-weight: 700;
    }
    .clima-hoy-desc { font-size: 1.1rem; color: var(--gris-suave); }
    .pronostico-fila {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }
    .pronostico-dia {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 14px 10px;
      text-align: center;
    }
    .pronostico-dia .dia-nombre { font-size: 0.78rem; color: var(--gris-suave); font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; }
    .pronostico-dia .dia-icono { font-size: 2rem; margin: 6px 0; }
    .pronostico-dia .dia-temp { font-size: 1.1rem; font-weight: 700; }
    .pronostico-dia .dia-min { font-size: 0.85rem; color: var(--gris-suave); }
    .pronostico-dia .dia-lluvia { font-size: 0.78rem; color: #74c0fc; margin-top: 4px; }

    /* ─── VIENTO ─── */
    .viento-detalle {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .viento-barra-cont {
      background: rgba(255,255,255,0.08);
      border-radius: 8px;
      height: 12px;
      overflow: hidden;
      margin-top: 4px;
    }
    .viento-barra {
      height: 100%;
      border-radius: 8px;
      background: linear-gradient(90deg, var(--verde-agua), var(--azul-claro));
      transition: width 1s ease;
    }

    /* ─── BOTONES ─── */
    .botones-fila {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 8px;
    }
    .btn {
      width: 100%;
      min-height: 76px;
      border: none;
      border-radius: 20px;
      font-family: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.1s ease, opacity 0.1s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      letter-spacing: 0.01em;
    }
    .btn:active { transform: scale(0.96); opacity: 0.85; }

    .btn-voz {
      font-size: 1.3rem;
      background: linear-gradient(135deg, #1e6faa, #2e78c7);
      color: white;
      box-shadow: 0 6px 30px rgba(46,120,199,0.4);
      border: 2px solid rgba(255,255,255,0.15);
    }
    .btn-voz.leyendo {
      background: linear-gradient(135deg, #0a5c2a, #1a8f4a);
      box-shadow: 0 6px 30px rgba(26,143,74,0.4);
      animation: pulsoBorde 1.5s ease-in-out infinite;
    }
    @keyframes pulsoBorde {
      0%, 100% { box-shadow: 0 6px 30px rgba(26,143,74,0.4); }
      50% { box-shadow: 0 6px 40px rgba(26,143,74,0.7), 0 0 0 6px rgba(26,143,74,0.15); }
    }
    .btn-actualizar {
      font-size: 1.1rem;
      background: rgba(255,255,255,0.08);
      color: var(--blanco);
      border: 2px solid rgba(255,255,255,0.15);
    }
    .btn-actualizar:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .btn-icono { font-size: 1.8rem; }

    /* ─── LOADING ─── */
    .cargando {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 60px 20px;
    }
    .spinner {
      width: 56px; height: 56px;
      border: 5px solid rgba(255,255,255,0.1);
      border-top-color: var(--azul-claro);
      border-radius: 50%;
      animation: girar 0.9s linear infinite;
    }
    @keyframes girar { to { transform: rotate(360deg); } }
    .cargando p { color: var(--gris-suave); font-size: 1rem; }

    /* ─── ERROR ─── */
    .error-msg {
      background: rgba(239,35,60,0.12);
      border: 1.5px solid rgba(239,35,60,0.3);
      border-radius: 16px;
      padding: 20px;
      text-align: center;
      color: #ff9999;
      font-size: 1rem;
    }

    /* ─── SIN DATOS BADGE ─── */
    .badge-offline {
      display: inline-block;
      background: rgba(255,209,102,0.15);
      color: var(--amarillo);
      border-radius: 8px;
      padding: 3px 10px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      margin-top: 6px;
    }

    /* ─── FOOTER ─── */
    footer {
      text-align: center;
      color: rgba(168,184,204,0.5);
      font-size: 0.7rem;
      padding: 30px 20px 20px;
    }

    /* ─── TOAST ─── */
    #toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      padding: 14px 28px;
      border-radius: 99px;
      font-size: 1rem;
      font-weight: 700;
      transition: transform 0.3s ease;
      z-index: 999;
      white-space: nowrap;
    }
    #toast.visible { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<!-- Olas de fondo -->
<svg class="olas-bg" viewBox="0 0 1440 180" preserveAspectRatio="none" fill="rgba(46,120,199,1)">
  <path class="ola" d="M0,60 C240,120 480,0 720,60 C960,120 1200,0 1440,60 L1440,180 L0,180 Z"/>
  <path class="ola" d="M0,90 C360,30 720,150 1080,90 C1260,60 1380,120 1440,90 L1440,180 L0,180 Z" fill="rgba(26,74,122,0.8)"/>
  <path class="ola" d="M0,120 C180,80 360,160 540,120 C720,80 900,160 1080,120 C1260,80 1380,140 1440,120 L1440,180 L0,180 Z" fill="rgba(13,33,55,0.9)"/>
</svg>

<div id="app">
  <header>
    <span class="logo-ola">🌊</span>
    <h1 class="titulo">Río Paranacito</h1>
    <p class="subtitulo">Información del río y el tiempo</p>
  </header>

  <div class="ultima-act" id="ultima-act">
    <div class="dot-live"></div>
    <span>Cargando datos...</span>
  </div>

  <div id="contenido">
    <div class="cargando">
      <div class="spinner"></div>
      <p>Obteniendo información del río...</p>
    </div>
  </div>

  <div class="botones-fila" style="margin-top:24px;">
    <button class="btn btn-voz" id="btn-voz" onclick="hablar()" aria-label="Leer información en voz alta">
      <span class="btn-icono">🔊</span>
      <span id="btn-voz-texto">Escuchar información</span>
    </button>
    <button class="btn btn-actualizar" id="btn-actualizar" onclick="cargarDatos(true)" aria-label="Actualizar datos ahora">
      <span class="btn-icono">🔄</span>
      <span>Actualizar ahora</span>
    </button>
  </div>

  <footer>
    <p>Fuentes: AGP · OpenWeather · Villa Paranacito, Entre Ríos 🇦🇷</p>
  </footer>
</div>

<div id="toast"></div>

<script>
  // ─── CONFIGURACIÓN ────────────────────────────────────────────────────────
  // CAMBIAR ESTA URL a la URL de tu backend desplegado en Render/Railway/etc.
  const API_BASE = window.location.hostname === 'localhost'
    ? 'http://localhost:3001'
    : 'https://TU-BACKEND-URL.onrender.com'; // ← CAMBIAR ESTO

  let datos = { rioPlata: null, rioUruguay: null, viento: null, clima: null };
  let estaHablando = false;
  let intervaloActualizacion = null;

  // ─── UTILIDADES ───────────────────────────────────────────────────────────
  function mostrarToast(msg, duracion = 2500) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('visible');
    setTimeout(() => t.classList.remove('visible'), duracion);
  }

  function formatearNivel(metros) {
    if (metros === null || metros === undefined) return '—';
    const m = Math.floor(metros);
    const cm = Math.round((metros - m) * 100);
    return cm > 0 ? `${m}m ${cm}cm` : `${m}m`;
  }

  function iconoTendencia(t) {
    if (t === 'sube') return '↑';
    if (t === 'baja') return '↓';
    return '→';
  }

  // ─── CARGAR DATOS ─────────────────────────────────────────────────────────
  async function fetchEndpoint(path) {
    const res = await fetch(`${API_BASE}/api/${path}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  }

  async function cargarDatos(forzar = false) {
    const btn = document.getElementById('btn-actualizar');
    btn.disabled = true;
    btn.querySelector('span:last-child').textContent = 'Actualizando...';

    // Intentar cargar de caché local si hay error de red
    const cachedLocal = localStorage.getItem('rio_datos');

    try {
      const [rioPlata, rioUruguay, viento, clima] = await Promise.allSettled([
        fetchEndpoint('rio-plata'),
        fetchEndpoint('rio-uruguay'),
        fetchEndpoint('viento'),
        fetchEndpoint('clima')
      ]);

      datos = {
        rioPlata: rioPlata.status === 'fulfilled' ? rioPlata.value : null,
        rioUruguay: rioUruguay.status === 'fulfilled' ? rioUruguay.value : null,
        viento: viento.status === 'fulfilled' ? viento.value : null,
        clima: clima.status === 'fulfilled' ? clima.value : null
      };

      localStorage.setItem('rio_datos', JSON.stringify({ datos, ts: Date.now() }));
      renderizar();
      mostrarToast('✅ Datos actualizados');
    } catch(e) {
      // Modo offline: usar caché
      if (cachedLocal) {
        const c = JSON.parse(cachedLocal);
        datos = c.datos;
        renderizar(true);
        mostrarToast('📶 Sin conexión — mostrando últimos datos', 4000);
      } else {
        document.getElementById('contenido').innerHTML =
          `<div class="error-msg">⚠️ No se pudo conectar al servidor.<br>Verificá tu conexión a internet.</div>`;
      }
    }

    const ahora = new Date().toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' });
    document.getElementById('ultima-act').innerHTML =
      `<div class="dot-live"></div><span>Actualizado a las ${ahora}</span>`;

    btn.disabled = false;
    btn.querySelector('span:last-child').textContent = 'Actualizar ahora';
  }

  // ─── RENDERIZADO ──────────────────────────────────────────────────────────
  function renderizar(offline = false) {
    const { rioPlata, rioUruguay, viento, clima } = datos;

    const nivelBadge = offline ? '<span class="badge-offline">📶 SIN CONEXIÓN</span>' : '';

    // ── Río de la Plata ──
    let htmlPlata = `<div class="tarjeta ${rioPlata?.alerta === 'peligro' ? 'alerta-peligro' : rioPlata?.alerta === 'precaucion' ? 'alerta-precaucion' : ''}">
      <div class="tarjeta-icono">🌊</div>
      <div class="tarjeta-titulo">Río de la Plata</div>`;
    if (rioPlata?.nivel_metros) {
      htmlPlata += `
        <div class="tarjeta-valor">${formatearNivel(rioPlata.nivel_metros)}</div>
        <div class="tendencia ${rioPlata.tendencia}">${iconoTendencia(rioPlata.tendencia)} ${rioPlata.tendencia === 'sube' ? 'Subiendo' : rioPlata.tendencia === 'baja' ? 'Bajando' : 'Estable'}</div>
        <div class="tarjeta-sub">${rioPlata.alerta === 'peligro' ? '⚠️ Nivel alto' : rioPlata.alerta === 'precaucion' ? '⚠️ Precaución' : '✅ Nivel normal'}</div>
        ${nivelBadge}`;
    } else {
      htmlPlata += `<div class="tarjeta-sub">Sin datos disponibles</div>`;
    }
    htmlPlata += `</div>`;

    // ── Río Uruguay ──
    let htmlUruguay = `<div class="tarjeta">
      <div class="tarjeta-icono">🌊</div>
      <div class="tarjeta-titulo">Río Uruguay</div>`;
    if (rioUruguay?.estaciones?.length > 0) {
      rioUruguay.estaciones.slice(0,2).forEach(est => {
        htmlUruguay += `
          <div>
            <div class="tarjeta-sub">${est.estacion}</div>
            <div class="tarjeta-valor" style="font-size:2rem">${formatearNivel(est.nivel_metros)}</div>
          </div>`;
      });
    } else {
      htmlUruguay += `<div class="tarjeta-sub">Sin datos disponibles</div>`;
    }
    htmlUruguay += `${nivelBadge}</div>`;

    // ── Viento ──
    const velPct = viento ? Math.min((viento.velocidad_kmh / 80) * 100, 100) : 0;
    let htmlViento = `<div class="tarjeta">
      <div class="tarjeta-icono">💨</div>
      <div class="tarjeta-titulo">Viento · Río de la Plata</div>`;
    if (viento?.velocidad_kmh) {
      htmlViento += `
        <div class="tarjeta-valor">${viento.velocidad_kmh} <span>km/h</span></div>
        <div class="tarjeta-sub">${viento.direccion} · ${viento.intensidad}</div>
        <div class="viento-barra-cont">
          <div class="viento-barra" style="width:${velPct}%"></div>
        </div>
        <div class="tarjeta-sub" style="font-size:0.8rem">Ráfagas: ${viento.rafaga_kmh} km/h</div>
        ${nivelBadge}`;
    } else {
      htmlViento += `<div class="tarjeta-sub">Sin datos disponibles</div>`;
    }
    htmlViento += `</div>`;

    // ── Clima ──
    let htmlClima = `<div class="tarjeta tarjeta-clima">
      <div class="tarjeta-icono">🌦️</div>
      <div class="tarjeta-titulo">Clima · Villa Paranacito</div>`;
    if (clima?.hoy) {
      htmlClima += `
        <div class="clima-hoy">
          <div style="font-size:3.5rem">${clima.hoy.icono}</div>
          <div>
            <div class="clima-hoy-temp">${clima.hoy.temp_max}°C <span style="font-size:1.5rem;color:var(--gris-suave)">/ ${clima.hoy.temp_min}°</span></div>
            <div class="clima-hoy-desc">${clima.hoy.descripcion}</div>
            <div class="tarjeta-sub" style="font-size:0.85rem">💧 Humedad: ${clima.hoy.humedad}%</div>
          </div>
        </div>`;
      if (clima.pronostico?.length > 0) {
        htmlClima += `<div class="pronostico-fila">`;
        clima.pronostico.forEach(d => {
          htmlClima += `
            <div class="pronostico-dia">
              <div class="dia-nombre">${d.dia}</div>
              <div class="dia-icono">${d.icono}</div>
              <div class="dia-temp">${d.temp_max}°</div>
              <div class="dia-min">${d.temp_min}°</div>
              ${d.lluvia_mm > 0 ? `<div class="dia-lluvia">🌧 ${d.lluvia_mm}mm</div>` : ''}
            </div>`;
        });
        htmlClima += `</div>`;
      }
    } else {
      htmlClima += `<div class="tarjeta-sub">Sin datos disponibles</div>`;
    }
    if (!clima?.fuente_disponible) {
      htmlClima += `<div class="badge-offline">Configurar API clima</div>`;
    }
    htmlClima += `</div>`;

    document.getElementById('contenido').innerHTML =
      `<div class="grid">${htmlPlata}${htmlUruguay}${htmlViento}${htmlClima}</div>`;
  }

  // ─── VOZ ──────────────────────────────────────────────────────────────────
  function generarTextoVoz() {
    const { rioPlata, rioUruguay, viento, clima } = datos;
    let partes = ['Información actualizada.'];

    if (rioPlata?.nivel_metros) {
      const m = Math.floor(rioPlata.nivel_metros);
      const cm = Math.round((rioPlata.nivel_metros - m) * 100);
      const nivel = cm > 0 ? `${m} metros con ${cm} centímetros` : `${m} metros`;
      const tend = rioPlata.tendencia === 'sube' ? 'en aumento' : rioPlata.tendencia === 'baja' ? 'en descenso' : 'estable';
      partes.push(`Altura del Río de la Plata: ${nivel}, ${tend}.`);
      if (rioPlata.alerta === 'peligro') partes.push('Alerta: nivel alto del río.');
    }

    if (rioUruguay?.estaciones?.length > 0) {
      const e = rioUruguay.estaciones[0];
      partes.push(`Río Uruguay en ${e.estacion}: ${formatearNivel(e.nivel_metros).replace('m', ' metros ').replace('cm', ' centímetros')}.`);
    }

    if (viento?.velocidad_kmh) {
      partes.push(`Viento del ${viento.direccion} a ${viento.velocidad_kmh} kilómetros por hora. Intensidad: ${viento.intensidad}.`);
    }

    if (clima?.hoy) {
      partes.push(`Clima en Villa Paranacito: ${clima.hoy.descripcion}. Temperatura máxima ${clima.hoy.temp_max} grados, mínima ${clima.hoy.temp_min} grados.`);
      if (clima.pronostico?.[0]) {
        partes.push(`${clima.pronostico[0].dia}: ${clima.pronostico[0].descripcion}, máxima ${clima.pronostico[0].temp_max} grados.`);
      }
    }

    return partes.join(' ');
  }

  function hablar() {
    if (!('speechSynthesis' in window)) {
      mostrarToast('⚠️ Tu dispositivo no soporta lectura en voz', 3000);
      return;
    }

    const synth = window.speechSynthesis;
    const btnVoz = document.getElementById('btn-voz');
    const btnTexto = document.getElementById('btn-voz-texto');

    if (estaHablando) {
      synth.cancel();
      estaHablando = false;
      btnVoz.classList.remove('leyendo');
      btnTexto.textContent = 'Escuchar información';
      return;
    }

    const texto = generarTextoVoz();
    const utterance = new SpeechSynthesisUtterance(texto);
    utterance.lang = 'es-AR';
    utterance.rate = 0.85;
    utterance.pitch = 1.0;
    utterance.volume = 1.0;

    // Seleccionar voz en español si está disponible
    const voces = synth.getVoices();
    const vozES = voces.find(v => v.lang === 'es-AR') ||
                  voces.find(v => v.lang.startsWith('es')) ||
                  null;
    if (vozES) utterance.voice = vozES;

    utterance.onstart = () => {
      estaHablando = true;
      btnVoz.classList.add('leyendo');
      btnTexto.textContent = 'Detener lectura';
    };
    utterance.onend = () => {
      estaHablando = false;
      btnVoz.classList.remove('leyendo');
      btnTexto.textContent = 'Escuchar información';
    };
    utterance.onerror = () => {
      estaHablando = false;
      btnVoz.classList.remove('leyendo');
      btnTexto.textContent = 'Escuchar información';
    };

    synth.speak(utterance);
  }

  // Cargar voces cuando estén disponibles (necesario en algunos browsers)
  if ('speechSynthesis' in window) {
    speechSynthesis.onvoiceschanged = () => {};
  }

  // ─── SERVICE WORKER ───────────────────────────────────────────────────────
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./public/sw.js').catch(() => {});
    });
  }

  // ─── INICIO ───────────────────────────────────────────────────────────────
  cargarDatos();
  // Auto actualizar cada 5 minutos
  intervaloActualizacion = setInterval(() => cargarDatos(), 5 * 60 * 1000);
</script>
